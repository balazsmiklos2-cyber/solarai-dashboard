<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SOLAR AI Dashboard</title>

  <style>
    body{
      background:#0f1115;
      color:white;
      font-family:Arial;
      margin:0;
      padding:20px;
    }

    h1{
      font-size:40px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:#1b1f27;
      border-radius:20px;
      padding:20px;
    }

    .label{
      color:#999;
      margin-bottom:10px;
    }

    .value{
      font-size:48px;
      font-weight:bold;
    }

    .small{
      margin-top:10px;
      color:#777;
    }
  </style>
</head>

<body>

  <h1>SOLAR AI Dashboard</h1>

  <div class="grid">

    <div class="card">
      <div class="label">
        Temperature
      </div>

      <div
        class="value"
        id="temp"
      >
        --
      </div>
    </div>

    <div class="card">
      <div class="label">
        Battery
      </div>

      <div
        class="value"
        id="battery"
      >
        --
      </div>
    </div>

    <div class="card">
      <div class="label">
        Node Status
      </div>

      <div
        class="value"
        id="status"
        style="font-size:32px;"
      >
        CONNECTING
      </div>

      <div
        class="small"
        id="lastupdate"
      >
        waiting for mqtt...
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <script>

    const tempElement =
      document.getElementById(
        "temp"
      );

    const batteryElement =
      document.getElementById(
        "battery"
      );

    const statusElement =
      document.getElementById(
        "status"
      );

    const updateElement =
      document.getElementById(
        "lastupdate"
      );

    const client =
      mqtt.connect(
        "wss://broker.hivemq.com:8884/mqtt"
      );

    client.on(
      "connect",
      () => {

        statusElement.innerText =
          "ONLINE";

        updateElement.innerText =
          "MQTT CONNECTED";

        client.subscribe(
          "solarai/balazsnode9284/temp"
        );

        client.subscribe(
          "solarai/balazsnode9284/battery"
        );
      }
    );

    client.on(
      "message",
      (
        topic,
        message
      ) => {

        const value =
          message.toString();

        if(
          topic
          ===
          "solarai/balazsnode9284/temp"
        ){

          tempElement.innerText =
            value + "°C";
        }

        if(
          topic
          ===
          "solarai/balazsnode9284/battery"
        ){

          batteryElement.innerText =
            value + "V";
        }

        updateElement.innerText =
          "Last update: "
          +
          new Date()
          .toLocaleTimeString();
      }
    );

    client.on(
      "offline",
      () => {

        statusElement.innerText =
          "OFFLINE";
      }
    );

    client.on(
      "error",
      () => {

        statusElement.innerText =
          "MQTT ERROR";
      }
    );

  </script>

</body>
</html>
