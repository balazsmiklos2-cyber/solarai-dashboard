<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>SOLAR AI Dashboard</title>

  <style>
    body{
      background:#0f1115;
      color:white;
      font-family:Arial;
      margin:0;
      padding:20px;
    }

    h1{
      font-size:40px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      margin-top:30px;
    }

    .card{
      background:#1b1f27;
      border-radius:20px;
      padding:20px;
    }

    .label{
      color:#999;
      margin-bottom:10px;
    }

    .value{
      font-size:48px;
      font-weight:bold;
    }

    .small{
      margin-top:10px;
      color:#777;
    }
  </style>
</head>

<body>

  <h1>SOLAR AI Dashboard</h1>

  <div class="grid">

    <div class="card">
      <div class="label">
        Temperature
      </div>

      <div
        class="value"
        id="temp"
      >
        --
      </div>
    </div>

    <div class="card">
      <div class="label">
        Battery
      </div>

      <div
        class="value"
        id="battery"
      >
        --
      </div>
    </div>

    <div class="card">
      <div class="label">
        Node Status
      </div>

      <div
        class="value"
        id="status"
        style="font-size:32px;"
      >
        ONLINE
      </div>

      <div
        class="small"
        id="lastupdate"
      >
        waiting for data...
      </div>
    </div>

  </div>

  <script>

    // DEMO VALUES

    let temp = 23.6;
    let battery = 3.84;

    document.getElementById(
      "temp"
    ).innerText =
      temp + "°C";

    document.getElementById(
      "battery"
    ).innerText =
      battery + "V";

    document.getElementById(
      "lastupdate"
    ).innerText =
      "Last update: "
      +
      new Date().toLocaleTimeString();

  </script>

</body>
</html>
